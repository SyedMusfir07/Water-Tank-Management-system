<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SWQMS Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="topbar">
    <h1>Smart Water Quality Monitoring System (SWQMS)</h1>
    <div id="statusBadge" class="badge">Connecting...</div>
  </header>

  <main class="container">
    <section class="cards">
      <div class="card">
        <h3>Temperature (°C)</h3>
        <p id="tempValue" class="value">--</p>
      </div>

      <div class="card">
        <h3>TDS (ppm)</h3>
        <p id="tdsValue" class="value">--</p>
      </div>

      <div class="card">
        <h3>Turbidity (NTU)</h3>
        <p id="turbValue" class="value">--</p>
      </div>

      <div class="card alert">
        <h3>Pollution Alert</h3>
        <p id="pollutionValue" class="value">--</p>
      </div>
    </section>

    <section class="history">
      <h2>Recent Readings</h2>
      <table>
        <thead>
          <tr>
            <th>Time Key</th>
            <th>Temp (°C)</th>
            <th>TDS (ppm)</th>
            <th>NTU</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="historyBody">
          <tr><td colspan="5">Loading...</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <footer class="footer">
    <p>Developed by Syed Musfir & Team</p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
